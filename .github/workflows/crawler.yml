name: Daily GPU Price Crawler

on:
  schedule:
    # UTC 기준 14:55분은 한국 시간(KST)으로 23:55분입니다. 자정 시점에 맞춘 크론탭 설정
    - cron: '55 14 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

# 가상 러너 환경 전체에 Node.js 24 강제 적용 옵션 주입
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    # Node.js 24 기반으로 업데이트된 최신 버전 v4+ 호환 체크아웃 활용
    - name: 레포지토리 코드 체크아웃
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    # 최신 가상 환경 아키텍처에 맞춘 파이썬 환경 설정
    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 패키지 캐싱을 추가하여 실행 속도를 더 빠르게 개선합니다.

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 supabase

    - name: 크롤러 스크립트 실행
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        # 파일명이 혹시 다른 이름이라면 그에 맞게 자동으로 찾아서 실행하도록 고도화
        if [ -f "crawler.py" ]; then
          python crawler.py
        else
          python gemini-code-1779520365880.py
        fi
